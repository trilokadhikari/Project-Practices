<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>
    <div class="buttons">
        <button id="rock" onclick="run('Rock')">👊</button>
        <button id="paper" onclick="run('Paper')">🤚</button>
        <button id="scissor" onclick="run('Scissor')">✌️</button>
    </div>
    <div class="input">
        <div id="playerInput">PLAYER: </div>
        <div id="computerInput">COMPUTER: </div>
    </div>
    <div id="displayResult">It is Result</div>
    <div class="score">
        <span id="playerScore">Player Score: </span><br>
        <span id="computerScore">Computer Score: </span>
    </div>

    <script src="script.js"></script>
</body>
</html>
